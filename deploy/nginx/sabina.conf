server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Frontend production build output (npm run build)
    root /var/www/sabina/dist;
    index index.html;

    # ---- Backend API ----
    # /api/* -> FastAPI (strip /api prefix)
    location = /api {
        return 301 /api/;
    }
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Static files served by backend
    location /uploads/ {
        proxy_pass http://127.0.0.1:8000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /images/ {
        proxy_pass http://127.0.0.1:8000/images/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Frontend SPA ----
    # Try static file first, fallback to index.html for client routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
