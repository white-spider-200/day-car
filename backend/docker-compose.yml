services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: doctrs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doctrs"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres_test:
    image: postgres:16
    environment:
      POSTGRES_DB: doctrs_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doctrs_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      extra_hosts:
        - "pypi.org:151.101.64.223"
        - "files.pythonhosted.org:151.101.64.223"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/doctrs
      JWT_SECRET_KEY: super-secret-change-me
      SEED_ADMIN_EMAIL: admin@sabina.dev
      SEED_ADMIN_PASSWORD: Admin12345!
      VIDEO_PROVIDER: ${VIDEO_PROVIDER:-ZOOM}
      VIDEO_TOKEN_SECRET: ${VIDEO_TOKEN_SECRET:-dev-video-token-secret}
      VIDEO_JOIN_WINDOW_MINUTES_BEFORE: ${VIDEO_JOIN_WINDOW_MINUTES_BEFORE:-15}
      VIDEO_JOIN_WINDOW_MINUTES_AFTER: ${VIDEO_JOIN_WINDOW_MINUTES_AFTER:-120}
      ZOOM_ACCOUNT_ID: ${ZOOM_ACCOUNT_ID:-}
      ZOOM_CLIENT_ID: ${ZOOM_CLIENT_ID:-}
      ZOOM_CLIENT_SECRET: ${ZOOM_CLIENT_SECRET:-}
      ZOOM_HOST_USER_ID: ${ZOOM_HOST_USER_ID:-me}
      ZOOM_JOIN_BEFORE_HOST: ${ZOOM_JOIN_BEFORE_HOST:-true}
      ZOOM_WAITING_ROOM: ${ZOOM_WAITING_ROOM:-true}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  test_runner:
    image: python:3.12-slim
    working_dir: /app
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres_test:5432/doctrs_test
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres_test:5432/doctrs_test
    volumes:
      - .:/app
    depends_on:
      postgres_test:
        condition: service_healthy

volumes:
  postgres_data:
  postgres_test_data:
